name: Deploy docs to GitHub Pages

# Publishes docs/index.html (which renders README.md) to GitHub Pages
# on every push to main, and can also be run manually.
on:
  push:
    branches: [main]
    paths:
      - README.md
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        # Copy the docs page and the README it renders into a publish folder.
        run: |
          mkdir -p _site
          cp docs/index.html _site/index.html
          cp README.md _site/README.md

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
