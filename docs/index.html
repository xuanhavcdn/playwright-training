<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playwright Training — Documentation</title>
    <meta
      name="description"
      content="Introduction and setup guide for the Playwright Training end-to-end test suite."
    />

    <!-- GitHub-flavored markdown styling -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-light.min.css"
    />
    <!-- Markdown renderer + syntax highlighting -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>

    <style>
      :root {
        --accent: #2dba4e;
      }
      body {
        margin: 0;
        background: #f6f8fa;
        color: #1f2328;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
      }
      header.site {
        background: linear-gradient(135deg, #0d1117 0%, #1b3a2a 100%);
        color: #fff;
        padding: 40px 24px;
        text-align: center;
      }
      header.site h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }
      header.site p {
        margin: 0;
        opacity: 0.85;
      }
      .markdown-body {
        box-sizing: border-box;
        max-width: 920px;
        margin: 24px auto;
        padding: 32px 40px;
        background: #fff;
        border: 1px solid #d0d7de;
        border-radius: 8px;
      }
      footer.site {
        text-align: center;
        padding: 24px;
        color: #57606a;
        font-size: 0.85rem;
      }
      .loading {
        text-align: center;
        color: #57606a;
        padding: 40px;
      }
      @media (max-width: 640px) {
        .markdown-body {
          padding: 20px;
          margin: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site">
      <h1>🎭 Playwright Training</h1>
      <p>End-to-end test suite — Page Object Model · TypeScript · GitHub Actions</p>
    </header>

    <article id="content" class="markdown-body">
      <p class="loading">Loading documentation…</p>
    </article>

    <footer class="site">
      Rendered from <code>README.md</code> · Built with Playwright
    </footer>

    <script>
      // The README is copied next to this file by the Pages deploy workflow,
      // so the docs always stay in sync with the single source of truth.
      fetch("./README.md")
        .then((res) => {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.text();
        })
        .then((md) => {
          marked.setOptions({
            highlight: (code, lang) => {
              if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
              }
              return hljs.highlightAuto(code).value;
            },
          });
          document.getElementById("content").innerHTML = marked.parse(md);
        })
        .catch((err) => {
          document.getElementById("content").innerHTML =
            '<p class="loading">Could not load <code>README.md</code> (' +
            err.message +
            "). This page must be viewed via GitHub Pages or a local web server.</p>";
        });
    </script>
  </body>
</html>
